<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d2a50"/>
      <stop offset="100%" stop-color="#030d1a"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#1a6e66"/>
    </linearGradient>
    <linearGradient id="textL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ffff4"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <linearGradient id="textV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe88a"/>
      <stop offset="100%" stop-color="#f7a01e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <g clip-path="url(#round)">
    <!-- Stars -->
    <circle cx="80" cy="60" r="4" fill="#ffe066" opacity="0.9"/>
    <circle cx="180" cy="40" r="3" fill="#fff" opacity="0.7"/>
    <circle cx="340" cy="55" r="3.5" fill="#ffe066" opacity="0.8"/>
    <circle cx="440" cy="38" r="3" fill="#fff" opacity="0.6"/>
    <circle cx="120" cy="100" r="2.5" fill="#fff" opacity="0.5"/>
    <circle cx="420" cy="90" r="2.5" fill="#ffe066" opacity="0.7"/>
    <circle cx="260" cy="30" r="3" fill="#fff" opacity="0.6"/>

    <!-- Moon -->
    <circle cx="130" cy="115" r="58" fill="#fff8d6" opacity="0.95" filter="url(#softglow)"/>
    <circle cx="152" cy="96" r="46" fill="#0a1828"/>

    <!-- Mountains -->
    <polygon points="0,340 100,160 200,340" fill="#152238" opacity="0.95"/>
    <polygon points="120,340 256,120 392,340" fill="#1a2d4a"/>
    <polygon points="320,340 420,175 512,310 512,340" fill="#152238" opacity="0.9"/>

    <!-- Shore grass -->
    <path d="M0,336 Q128,318 256,326 Q384,334 512,318 L512,355 L0,355 Z" fill="#2a4a18"/>

    <!-- Water -->
    <rect x="0" y="355" width="512" height="157" fill="url(#water)"/>
    <path d="M0,375 Q64,366 128,375 Q192,384 256,375 Q320,366 384,375 Q448,384 512,375" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>
    <path d="M0,405 Q80,396 160,405 Q240,414 320,405 Q400,396 480,405 L512,405" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>

    <!-- Palm trunk -->
    <path d="M430,355 Q420,300 412,248 Q404,196 408,158" stroke="#7a5020" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Palm fronds -->
    <path d="M408,158 Q362,115 318,130" stroke="#2e7a18" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M408,158 Q398,108 412,82" stroke="#38902a" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M408,158 Q446,118 478,130" stroke="#2e7a18" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M408,158 Q455,150 488,174" stroke="#38902a" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M408,158 Q382,182 360,196" stroke="#2e7a18" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Coconuts -->
    <circle cx="404" cy="173" r="14" fill="#6b3a1f"/>
    <circle cx="418" cy="164" r="12" fill="#7a4522"/>

    <!-- Hut / bungalow -->
    <rect x="28" y="288" width="120" height="65" rx="6" fill="#7a4a18"/>
    <polygon points="12,292 148,292 80,238" fill="#5c3210"/>
    <rect x="60" y="318" width="40" height="35" fill="#4a2808"/>
    <!-- Hut windows -->
    <rect x="36" y="300" width="30" height="22" rx="3" fill="#ffe8a0" opacity="0.6"/>
    <rect x="102" y="300" width="30" height="22" rx="3" fill="#ffe8a0" opacity="0.6"/>
    <!-- Dock -->
    <rect x="62" y="353" width="36" height="10" fill="#8a6030"/>
    <rect x="58" y="355" width="8" height="60" fill="#7a5020"/>
    <rect x="92" y="355" width="8" height="60" fill="#7a5020"/>
    <!-- Lantern on dock -->
    <circle cx="78" cy="358" r="7" fill="#ffe066" opacity="0.8" filter="url(#softglow)"/>

    <!-- Wordmark: LAGOON -->
    <text x="256" y="450"
      text-anchor="middle"
      font-family="'Arial Black', 'Segoe UI', Arial, sans-serif"
      font-size="88" font-weight="900" letter-spacing="4"
      fill="url(#textL)" filter="url(#glow)">LAGOON</text>

    <!-- Wordmark: VALLEY -->
    <text x="256" y="510"
      text-anchor="middle"
      font-family="'Arial Black', 'Segoe UI', Arial, sans-serif"
      font-size="100" font-weight="900" letter-spacing="4"
      fill="url(#textV)" filter="url(#glow)">VALLEY</text>
  </g>

  <!-- Border ring -->
  <rect x="8" y="8" width="496" height="496" rx="96" fill="none" stroke="#ffe066" stroke-width="6" opacity="0.6"/>
  <rect x="18" y="18" width="476" height="476" rx="90" fill="none" stroke="rgba(255,220,80,0.2)" stroke-width="2"/>
</svg>
