<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="f-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0620"/>
      <stop offset="100%" stop-color="#0a2a4a"/>
    </linearGradient>
    <linearGradient id="f-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#1a6e66"/>
    </linearGradient>
    <clipPath id="f-clip">
      <rect x="1" y="1" width="30" height="30" rx="7"/>
    </clipPath>
  </defs>
  <!-- Gold border -->
  <rect x="0" y="0" width="32" height="32" rx="8" fill="#ffe066"/>
  <!-- Sky -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#f-sky)"/>
  <g clip-path="url(#f-clip)">
    <!-- Stars -->
    <circle cx="5" cy="5" r="0.8" fill="#ffe066" opacity="0.9"/>
    <circle cx="15" cy="3" r="0.6" fill="#fff" opacity="0.7"/>
    <circle cx="25" cy="6" r="0.8" fill="#ffe066" opacity="0.8"/>
    <!-- Moon -->
    <circle cx="8" cy="9" r="4" fill="#fff8d6" opacity="0.9"/>
    <circle cx="10" cy="7" r="3.2" fill="#0a1828"/>
    <!-- Mountains -->
    <polygon points="1,24 8,11 15,24" fill="#1e3050"/>
    <polygon points="12,24 20,9 28,24" fill="#1a2a42"/>
    <!-- Ground -->
    <rect x="1" y="22" width="30" height="4" fill="#2a4a18"/>
    <!-- Palm tree -->
    <path d="M26,26 Q25,20 24,14" stroke="#7a4a20" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M24,14 Q20,9 16,11" stroke="#2e7a18" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M24,14 Q25,8 28,9" stroke="#38902a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M24,14 Q28,13 30,17" stroke="#2e7a18" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Water -->
    <rect x="1" y="26" width="30" height="5" fill="url(#f-water)"/>
    <path d="M3,28 Q8,26 13,28 Q18,30 23,28 Q27,26 31,28" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  </g>
</svg>
