<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520">
  <defs>
    <radialGradient id="lbg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0d2a50"/>
      <stop offset="100%" stop-color="#030d1a"/>
    </radialGradient>
    <linearGradient id="lwater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#1a6e66"/>
    </linearGradient>
    <linearGradient id="ltextL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ffff4"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <linearGradient id="ltextV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe88a"/>
      <stop offset="100%" stop-color="#f7a01e"/>
    </linearGradient>
    <filter id="lglow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lsglow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lround">
      <rect width="520" height="520" rx="80"/>
    </clipPath>
  </defs>

  <!-- Gold border glow -->
  <rect x="4" y="4" width="512" height="512" rx="82" fill="none" stroke="#ffe066" stroke-width="10" opacity="0.5" filter="url(#lsglow)"/>
  <!-- Background -->
  <rect width="520" height="520" rx="80" fill="url(#lbg)"/>
  <!-- Gold ring -->
  <rect x="6" y="6" width="508" height="508" rx="76" fill="none" stroke="#ffe066" stroke-width="5" opacity="0.75"/>

  <g clip-path="url(#lround)">
    <!-- Stars -->
    <circle cx="75" cy="55" r="4.5" fill="#ffe066" opacity="0.9"/>
    <circle cx="175" cy="38" r="3.5" fill="#fff" opacity="0.75"/>
    <circle cx="290" cy="28" r="3" fill="#fff" opacity="0.6"/>
    <circle cx="370" cy="52" r="4" fill="#ffe066" opacity="0.85"/>
    <circle cx="460" cy="36" r="3.5" fill="#fff" opacity="0.7"/>
    <circle cx="115" cy="92" r="2.5" fill="#fff" opacity="0.5"/>
    <circle cx="430" cy="85" r="3" fill="#ffe066" opacity="0.65"/>
    <circle cx="220" cy="70" r="2" fill="#fff" opacity="0.55"/>

    <!-- Moon glow aura -->
    <circle cx="128" cy="115" r="72" fill="#fff8d6" opacity="0.12" filter="url(#lsglow)"/>
    <!-- Moon -->
    <circle cx="128" cy="115" r="62" fill="#fff8d6" opacity="0.96"/>
    <circle cx="152" cy="96" r="50" fill="#0a1828"/>

    <!-- Mountains back -->
    <polygon points="0,350 110,165 220,350" fill="#132035" opacity="0.9"/>
    <polygon points="140,350 260,125 380,350" fill="#192a48"/>
    <polygon points="320,350 430,178 520,308 520,350" fill="#132035" opacity="0.9"/>

    <!-- Snow caps -->
    <polygon points="100,183 110,165 120,183" fill="rgba(255,255,255,0.13)"/>
    <polygon points="248,143 260,125 272,143" fill="rgba(255,255,255,0.11)"/>
    <polygon points="418,196 430,178 442,196" fill="rgba(255,255,255,0.13)"/>

    <!-- Shore -->
    <path d="M0,346 Q130,328 260,336 Q390,344 520,326 L520,364 L0,364 Z" fill="#2a4a18"/>

    <!-- Water -->
    <rect x="0" y="364" width="520" height="156" fill="url(#lwater)"/>
    <path d="M0,382 Q65,373 130,382 Q195,391 260,382 Q325,373 390,382 Q455,391 520,382" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="3.5"/>
    <path d="M0,412 Q85,403 170,412 Q255,421 340,412 Q425,403 520,412" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2.5"/>
    <path d="M0,442 Q100,433 200,442 Q300,451 400,442 Q460,436 520,442" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    <!-- Water shimmer -->
    <ellipse cx="260" cy="400" rx="160" ry="18" fill="rgba(255,224,102,0.07)"/>

    <!-- Hut / bungalow -->
    <rect x="24" y="290" width="128" height="72" rx="7" fill="#7a4a18"/>
    <polygon points="8,294 168,294 88,232" fill="#5c3210"/>
    <!-- Roof detail -->
    <polygon points="8,294 168,294 88,250" fill="none" stroke="#4a2808" stroke-width="4"/>
    <rect x="60" y="322" width="46" height="40" fill="#4a2808"/>
    <rect x="32" y="302" width="34" height="25" rx="3" fill="#ffe8a0" opacity="0.65"/>
    <rect x="110" y="302" width="34" height="25" rx="3" fill="#ffe8a0" opacity="0.65"/>
    <!-- Dock -->
    <rect x="64" y="362" width="42" height="12" fill="#8a6030"/>
    <rect x="60" y="364" width="9" height="72" fill="#7a5020"/>
    <rect x="97" y="364" width="9" height="72" fill="#7a5020"/>
    <rect x="60" y="400" width="46" height="6" fill="#8a6030"/>
    <!-- Torch lights -->
    <circle cx="56" cy="368" r="7" fill="#ff9944" opacity="0.85" filter="url(#lsglow)"/>
    <circle cx="110" cy="360" r="7" fill="#ff9944" opacity="0.85" filter="url(#lsglow)"/>

    <!-- Palm trunk (right) -->
    <path d="M448,364 Q436,298 424,238 Q412,178 418,140" stroke="#7a5020" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Fronds -->
    <path d="M418,140 Q368,96 318,114" stroke="#2e7a18" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M418,140 Q407,85 422,58" stroke="#38902a" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M418,140 Q460,98 496,112" stroke="#2e7a18" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M418,140 Q468,134 504,158" stroke="#38902a" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M418,140 Q390,168 366,185" stroke="#2e7a18" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M418,140 Q450,162 472,185" stroke="#38902a" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Coconuts -->
    <circle cx="412" cy="158" r="16" fill="#6b3a1f"/>
    <circle cx="428" cy="148" r="13" fill="#7a4522"/>

    <!-- Foreground leaf cluster left -->
    <ellipse cx="40" cy="360" rx="60" ry="22" fill="#1a3a08" opacity="0.85"/>
    <ellipse cx="90" cy="350" rx="50" ry="18" fill="#2a5a12" opacity="0.75"/>

    <!-- Foreground leaf cluster right -->
    <ellipse cx="480" cy="355" rx="55" ry="20" fill="#1a3a08" opacity="0.85"/>

    <!-- Lantern right low -->
    <rect x="386" y="340" width="12" height="22" rx="2" fill="#8a6030"/>
    <ellipse cx="392" cy="336" rx="14" ry="10" fill="rgba(255,180,30,0.2)" filter="url(#lglow)"/>
    <rect x="383" y="327" width="18" height="18" rx="4" fill="#c08020" opacity="0.9"/>
    <circle cx="392" cy="336" r="7" fill="#ffe066" opacity="0.9" filter="url(#lsglow)"/>

    <!-- Wordmark: LAGOON -->
    <text x="260" y="462"
      text-anchor="middle"
      font-family="'Arial Black', 'Segoe UI', Arial, sans-serif"
      font-size="96" font-weight="900" letter-spacing="6"
      fill="url(#ltextL)" filter="url(#lglow)">LAGOON</text>

    <!-- Wordmark: VALLEY -->
    <text x="260" y="516"
      text-anchor="middle"
      font-family="'Arial Black', 'Segoe UI', Arial, sans-serif"
      font-size="108" font-weight="900" letter-spacing="6"
      fill="url(#ltextV)" filter="url(#lglow)">VALLEY</text>

    <!-- Decorative leaf ornament between words -->
    <path d="M200,474 Q230,468 260,474 Q290,480 320,474" fill="none" stroke="rgba(78,205,196,0.5)" stroke-width="2"/>
    <ellipse cx="260" cy="474" rx="9" ry="6" fill="#4ecdc4" opacity="0.55"/>
    <path d="M250,474 Q245,468 252,464" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.6"/>
    <path d="M270,474 Q275,468 268,464" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
