<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" role="img" aria-label="Lagoon Valley">
  <defs>
    <linearGradient id="lv-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0620"/>
      <stop offset="60%" stop-color="#0a2040"/>
      <stop offset="100%" stop-color="#0d3a50"/>
    </linearGradient>
    <linearGradient id="lv-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#1a6e66"/>
    </linearGradient>
    <linearGradient id="lv-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f7971e" stop-opacity="0.15"/>
    </linearGradient>
    <clipPath id="lv-badge">
      <rect x="12" y="12" width="216" height="168" rx="22"/>
    </clipPath>
    <filter id="lv-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <rect x="6" y="6" width="228" height="180" rx="26" fill="url(#lv-glow)" filter="url(#lv-blur)"/>
  <!-- Gold border -->
  <rect x="9" y="9" width="222" height="174" rx="24" fill="none" stroke="#ffe066" stroke-width="2.5"/>
  <rect x="12" y="12" width="216" height="168" rx="22" fill="none" stroke="rgba(255,224,102,0.25)" stroke-width="1"/>

  <g clip-path="url(#lv-badge)">
    <!-- Sky -->
    <rect x="12" y="12" width="216" height="168" fill="url(#lv-sky)"/>

    <!-- Stars -->
    <circle cx="28" cy="28" r="1.2" fill="#ffe066" opacity="0.9"/>
    <circle cx="50" cy="20" r="0.9" fill="#fff" opacity="0.7"/>
    <circle cx="74" cy="34" r="1.3" fill="#fff" opacity="0.6"/>
    <circle cx="96" cy="22" r="0.8" fill="#ffe066" opacity="0.8"/>
    <circle cx="118" cy="16" r="1.1" fill="#fff" opacity="0.7"/>
    <circle cx="142" cy="28" r="0.9" fill="#fff" opacity="0.6"/>
    <circle cx="164" cy="18" r="1.2" fill="#ffe066" opacity="0.85"/>
    <circle cx="186" cy="32" r="0.8" fill="#fff" opacity="0.7"/>
    <circle cx="208" cy="22" r="1.0" fill="#fff" opacity="0.6"/>
    <circle cx="40" cy="46" r="0.7" fill="#fff" opacity="0.5"/>
    <circle cx="110" cy="40" r="0.8" fill="#ffe066" opacity="0.5"/>
    <circle cx="200" cy="44" r="0.9" fill="#fff" opacity="0.5"/>

    <!-- Moon -->
    <circle cx="55" cy="42" r="16" fill="#fff8d6" opacity="0.95"/>
    <circle cx="62" cy="36" r="13" fill="#0d2038"/>

    <!-- Mountain range -->
    <polygon points="12,132 55,55 98,132" fill="#1a2a42" opacity="0.95"/>
    <polygon points="60,132 108,48 156,132" fill="#1e3050"/>
    <polygon points="120,132 165,62 210,132" fill="#1a2a42" opacity="0.95"/>
    <polygon points="170,132 200,78 228,132" fill="#1e3050"/>

    <!-- Snow caps -->
    <polygon points="46,70 55,55 64,70" fill="rgba(255,255,255,0.12)"/>
    <polygon points="99,63 108,48 117,63" fill="rgba(255,255,255,0.10)"/>
    <polygon points="156,77 165,62 174,77" fill="rgba(255,255,255,0.12)"/>

    <!-- Shore -->
    <path d="M12,128 Q60,118 120,122 Q180,126 228,118 L228,145 L12,145 Z" fill="#2a4a18"/>

    <!-- Crop rows -->
    <rect x="20" y="130" width="20" height="12" rx="2" fill="#1e380e"/>
    <rect x="44" y="130" width="20" height="12" rx="2" fill="#1e380e"/>
    <line x1="20" y1="136" x2="40" y2="136" stroke="#4a8a25" stroke-width="1.2" opacity="0.8"/>
    <line x1="44" y1="136" x2="64" y2="136" stroke="#4a8a25" stroke-width="1.2" opacity="0.8"/>
    <line x1="25" y1="130" x2="25" y2="136" stroke="#5aaa2a" stroke-width="1"/>
    <line x1="31" y1="131" x2="31" y2="136" stroke="#5aaa2a" stroke-width="1"/>
    <line x1="37" y1="130" x2="37" y2="136" stroke="#5aaa2a" stroke-width="1"/>
    <line x1="50" y1="130" x2="50" y2="136" stroke="#5aaa2a" stroke-width="1"/>
    <line x1="56" y1="131" x2="56" y2="136" stroke="#5aaa2a" stroke-width="1"/>
    <line x1="62" y1="130" x2="62" y2="136" stroke="#5aaa2a" stroke-width="1"/>

    <!-- Palm trunk -->
    <path d="M190,145 Q186,120 183,100 Q180,80 184,62" stroke="#7a4a20" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Palm leaves -->
    <path d="M184,62 Q168,44 148,52" stroke="#2e7a18" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M184,62 Q175,40 185,30" stroke="#38902a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M184,62 Q196,42 212,48" stroke="#2e7a18" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M184,62 Q200,58 214,68" stroke="#38902a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M184,62 Q178,74 165,78" stroke="#2e7a18" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M184,62 Q192,72 200,80" stroke="#38902a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Coconuts -->
    <circle cx="181" cy="68" r="3.5" fill="#6b3a1f"/>
    <circle cx="187" cy="64" r="3" fill="#7a4522"/>

    <!-- Lagoon water -->
    <rect x="12" y="145" width="216" height="35" fill="url(#lv-water)"/>
    <path d="M20,153 Q50,148 80,153 Q110,158 140,153 Q170,148 200,153 Q215,156 228,153" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M12,163 Q40,158 70,163 Q100,168 130,163 Q160,158 190,163 Q210,166 228,163" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M25,172 Q60,167 95,172 Q130,177 165,172 Q195,167 228,172" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
    <ellipse cx="120" cy="162" rx="55" ry="8" fill="rgba(255,224,102,0.08)"/>
  </g>

  <!-- Decorative rule -->
  <line x1="60" y1="205" x2="180" y2="205" stroke="#4ecdc4" stroke-width="0.8" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="120" y="222" text-anchor="middle"
    font-family="'Segoe UI', Arial, system-ui, sans-serif"
    font-size="24" font-weight="900" letter-spacing="7" fill="#4ecdc4">LAGOON</text>

  <text x="120" y="252" text-anchor="middle"
    font-family="'Segoe UI', Arial, system-ui, sans-serif"
    font-size="28" font-weight="900" letter-spacing="5" fill="#ffe066">VALLEY</text>

  <line x1="60" y1="261" x2="180" y2="261" stroke="#ffe066" stroke-width="0.8" opacity="0.4"/>
</svg>
